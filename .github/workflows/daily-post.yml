name: Daily Instagram Post

on:
  schedule:
    # UTC 0:00 = JST 9:00 に毎日実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 手動テスト用

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate daily post
        run: node scripts/generate-daily-post.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/daily-posts.json
          git diff --staged --quiet || git commit -m "daily: $(date -u +%Y-%m-%d)"
          git push
